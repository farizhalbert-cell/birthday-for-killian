<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday, Cantik </title>

    <style>
        body{
            margin:0;
            background: linear-gradient(to bottom,#ffd6e7,#ffeef5);
            font-family: Arial, sans-serif;
            text-align:center;
            overflow:hidden;
        }

        h1{
            margin-top:50px;
            color:#ff4f81;
            font-size:50px;
        }

        p{
            font-size:20px;
            color:#444;
            width:80%;
            margin:auto;
            line-height:1.8;
        }

        img{
            width:250px;
            border-radius:20px;
            margin-top:30px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
        }

        .heart{
            position:absolute;
            color:#ff4f81;
            animation:fall linear infinite;
        }

        @keyframes fall{
            from{
                transform:translateY(-100px);
            }

            to{
                transform:translateY(100vh);
            }
        }
    </style>
</head>

<body>

<h1>Happy Birthday, Cantik </h1>

<img src="foto.jpg">

<br><br>

<p>
Thank you for being part of my life.
I hope this year brings you happiness,
good health, and everything you've been wishing for.

Happy birthday, Killian Gallagher.
</p>

<audio controls autoplay loop>
    <source src="ladygirl.mp3" type="audio/mpeg">
</audio>

<script>

for(let i=0;i<30;i++){

    let heart=document.createElement("div");

    heart.innerHTML="❤️";

    heart.className="heart";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(20+Math.random()*30)+"px";

    heart.style.animationDuration=
    (3+Math.random()*5)+"s";

    document.body.appendChild(heart);

}

</script>

</body>
</html>
